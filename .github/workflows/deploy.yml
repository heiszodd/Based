name: Deploy Poke Token

on:
  push:
    paths:
      - 'contracts/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install OpenZeppelin
        run: |
          cd contracts
          # Initialize as git repo if needed for forge install
          git init
          forge install openzeppelin/openzeppelin-contracts --no-commit || true

      - name: Deploy to Base
        run: |
          cd contracts
          # Use public RPC if secret is missing
          RPC="${{ secrets.RPC_URL }}"
          if [ -z "$RPC" ]; then
            RPC="https://mainnet.base.org"
          fi
          
          echo "Deploying to Base via $RPC..."
          
          # Added --legacy for L2 gas compatibility and --slow for reliable broadcast
          # Using --skip-simulation if it still fails due to gas estimation
          forge script script/DeployPoke.s.sol \
            --rpc-url "$RPC" \
            --broadcast \
            --legacy \
            --slow \
            --skip-simulation
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
