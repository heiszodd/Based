name: Deploy Poke Token

on:
  push:
    paths:
      - 'contracts/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install OpenZeppelin
        run: |
          cd contracts
          # Force installation of OpenZeppelin and ignore existing files
          forge install openzeppelin/openzeppelin-contracts --no-commit

      - name: Deploy to Base
        run: |
          cd contracts
          # Use --legacy if the RPC/Network has issues with EIP-1559 (Base sometimes does)
          # Also use --skip-simulation if the burner has $0 for the check but will be funded
          # Adding --legacy as a common fix for gas-estimation failures on L2s
          forge script script/DeployPoke.s.sol --rpc-url ${{ secrets.RPC_URL }} --broadcast --legacy --verify
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
