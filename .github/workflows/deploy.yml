name: Deploy Poke Token

on:
  push:
    paths:
      - 'contracts/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install OpenZeppelin
        run: |
          cd contracts
          mkdir -p lib
          # Forge install requires a git repo context
          git init
          forge install openzeppelin/openzeppelin-contracts --no-commit || true

      - name: Debug Environment
        run: |
          cd contracts
          echo "Checking library files..."
          if [ -d "lib/openzeppelin-contracts" ]; then
            echo "OZ library directory exists."
          else
            echo "OZ library directory MISSING."
          fi
          
          echo "Checking Private Key configuration..."
          # We check length without printing the key
          PK_VAL="${{ secrets.PRIVATE_KEY }}"
          if [ -z "$PK_VAL" ]; then
            echo "ERROR: PRIVATE_KEY secret is not set in GitHub Secrets."
          else
            echo "PRIVATE_KEY is present (Length: ${#PK_VAL} characters)."
          fi

      - name: Deploy to Base
        run: |
          cd contracts
          
          # Fallback to public RPC if secret is missing
          RPC_URL="${{ secrets.RPC_URL }}"
          if [ -z "$RPC_URL" ]; then
            RPC_URL="https://mainnet.base.org"
          fi
          
          echo "Starting deployment to Base via $RPC_URL..."
          
          # Standardizing the deployment command for Base L2
          # 1. --legacy: Often required for L2s that don't support EIP-1559 perfectly
          # 2. --slow: Ensures transaction propagation
          # 3. --skip-simulation: Prevents local estimation errors from blocking the broadcast
          # 4. --chain-id 8453: Explicitly targets Base Mainnet
          
          forge script script/DeployPoke.s.sol \
            --rpc-url "$RPC_URL" \
            --private-key "${{ secrets.PRIVATE_KEY }}" \
            --broadcast \
            --legacy \
            --slow \
            --skip-simulation \
            --chain-id 8453 \
            -vvvv
