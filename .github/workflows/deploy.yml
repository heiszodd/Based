name: Deploy Poke Token

on:
  push:
    paths:
      - 'contracts/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install OpenZeppelin
        run: |
          cd contracts
          mkdir -p lib
          # Force install OZ if not present
          if [ ! -d "lib/openzeppelin-contracts" ]; then
            git init
            forge install openzeppelin/openzeppelin-contracts --no-commit
          fi

      - name: Debug Environment
        run: |
          cd contracts
          echo "Checking files..."
          ls -R lib/openzeppelin-contracts/contracts/token/ERC20/ERC20.sol || echo "OZ NOT FOUND"
          echo "Checking Private Key Length..."
          if [ -z "${{ secrets.PRIVATE_KEY }}" ]; then
            echo "PRIVATE_KEY IS EMPTY"
          else
            echo "PRIVATE_KEY is set (length: ${#PRIVATE_KEY})"
          fi

      - name: Deploy to Base
        run: |
          cd contracts
          RPC="${{ secrets.RPC_URL }}"
          if [ -z "$RPC" ]; then
            RPC="https://mainnet.base.org"
          fi
          
          # We use --broadcast and --private-key directly for maximum clarity
          # We use --legacy for Base EIP-1559 compatibility
          forge script script/DeployPoke.s.sol \
            --rpc-url "$RPC" \
            --private-key "${{ secrets.PRIVATE_KEY }}" \
            --broadcast \
            --legacy \
            --slow \
            --skip-simulation \
            -vvvv
